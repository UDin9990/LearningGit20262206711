<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Homepage</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            margin:0;
            padding:0;
            background:#f4f4f4;
        }

        header{
            background:#333;
            color:white;
            padding:15px;
            text-align:center;
        }

        nav{
            background:#555;
            padding:10px;
            text-align:center;
        }

        nav a{
            color:white;
            margin:0 15px;
            text-decoration:none;
            font-weight:bold;
        }

        nav a:hover{
            color:yellow;
        }

        .hero{
            background:#ddd;
            padding:60px;
            text-align:center;
        }

        .content{
            padding:40px;
            text-align:center;
        }

        footer{
            background:#333;
            color:white;
            text-align:center;
            padding:15px;
            position:fixed;
            bottom:0;
            width:100%;
        }
    </style>
</head>

<body>

<header>
    <h1>Welcome to My Website</h1>
</header>

<nav>
    <a href="#">Home</a>
    <a href="#">About</a>
    <a href="#">Services</a>
    <a href="#">Contact</a>
</nav>

<section class="hero">
    <h2>Your Main Message Here</h2>
    <p>This is the hero section of your homepage.</p>
</section>

<section class="content">
    <h2>About This Website</h2>
    <p>This is a simple homepage template created using HTML and CSS.</p>
</section>

<footer>
    <p>© 2026 My Website</p>
</footer>

</body>
</html>
